# ============================================================
# jobs.<domain> — reverse proxy + TLS
# Replace ${DOMAIN} with your real host (e.g. jobs.example.com)
# before/after initial certbot issuance (see infra/aws-ec2-setup.md).
# ============================================================

# ---- HTTP: ACME challenge + redirect to HTTPS ----
server {
    listen 80;
    server_name jobs.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Container health check target (kept on HTTP so it needs no cert).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: app ----
server {
    listen 443 ssl;
    http2 on;
    server_name jobs.example.com;

    ssl_certificate     /etc/letsencrypt/live/jobs.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobs.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- API ----
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Frontend (mobile-first SPA) ----
    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
