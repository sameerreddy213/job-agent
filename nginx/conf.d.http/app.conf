# ============================================================
# HTTP-only reverse proxy — for IP-based deploys without a domain/TLS.
# Selected by setting NGINX_CONF_DIR=./nginx/conf.d.http in .env.
# Reach the app at http://<public-ip>/ . Add a domain + the HTTPS config
# (nginx/conf.d) later for TLS.
# ============================================================
server {
    listen 80 default_server;
    server_name _;

    # Container health check target.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # ---- API ----
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Frontend (SPA) ----
    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
