# ============================================================
# job-agent — Phase 0 infrastructure orchestration
# Services: nginx, frontend, api, worker, postgres
# ============================================================
services:

  postgres:
    image: postgres:16-alpine
    container_name: jobagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    # Bound to the internal network only — NOT exposed to the host/public
    expose:
      - "5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobagent-api
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    # Only the api container runs migrations + admin seed (entrypoint.sh).
    environment:
      RUN_MIGRATIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - resumes:/data/resumes
      - generated:/data/generated
    expose:
      - "8000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobagent-worker
    restart: unless-stopped
    # Phase 0 placeholder; pipeline scheduler wired in later phases
    command: ["python", "-m", "app.worker"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      # Wait for api: it runs migrations + seed before becoming healthy,
      # so the worker never queries tables that don't exist yet.
      api:
        condition: service_healthy
    volumes:
      - resumes:/data/resumes
      - generated:/data/generated
    networks:
      - internal
    healthcheck:
      # Heartbeat file is refreshed every 60s by the scheduler; stale => unhealthy.
      test: ["CMD", "python", "-c", "import os,time,sys; sys.exit(0 if os.path.exists('/tmp/worker.heartbeat') and time.time()-os.path.getmtime('/tmp/worker.heartbeat')<180 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobagent-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: jobagent-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Defaults to the HTTPS+domain config. For an IP-only HTTP deploy set
      # NGINX_CONF_DIR=./nginx/conf.d.http in .env (see infra/aws-ec2-setup.md).
      - ${NGINX_CONF_DIR:-./nginx/conf.d}:/etc/nginx/conf.d:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  certbot:
    image: certbot/certbot:latest
    container_name: jobagent-certbot
    # Renewal loop; initial issuance documented in infra/aws-ec2-setup.md
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"]
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  resumes:
  generated:
  certbot_conf:
  certbot_www:
